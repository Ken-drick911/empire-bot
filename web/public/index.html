<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Empire</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div id="app">
        <nav class="navbar">
            <div class="nav-logo">⚔️ EMPIRE</div>
            <button class="nav-toggle" onclick="toggleMenu()">☰</button>
            <div class="nav-links" id="navLinks">
                <a href="#" onclick="showPage('home')">Home</a>
                <a href="#" onclick="showPage('leaderboard')">Leaderboard</a>
                <a href="#" onclick="showPage('shop')" id="navShop" style="display:none">Shop</a>
                <a href="#" onclick="showPage('profile')" id="navProfile" style="display:none">Profile</a>
                <button class="btn-login" id="loginBtn" onclick="showPage('login')">Login</button>
                <button class="btn-logout" id="logoutBtn" style="display:none" onclick="logout()">Logout</button>
            </div>
        </nav>

        <!-- Home -->
        <div id="page-home" class="page active">
            <div class="hero">
                <div class="hero-emblem">⚔️</div>
                <h1>EMPIRE</h1>
                <p>A medieval WhatsApp community.<br>Rise through the ranks. Build your legacy.</p>
                <button onclick="currentUser ? showPage('profile') : showPage('login')" class="btn-primary">Enter the Empire</button>
            </div>
        </div>

        <!-- Login -->
        <div id="page-login" class="page">
            <div class="auth-card">
                <div class="auth-emblem">⚔️</div>
                <h2 id="authTitle">Login</h2>
                <div id="loginForm">
                    <input type="tel" id="loginPhone" placeholder="Phone (e.g. 2348012345678)">
                    <input type="password" id="loginPassword" placeholder="Password">
                    <button class="btn-primary" onclick="login()">Enter</button>
                    <p>No account? <a href="#" onclick="toggleAuth()">Register</a></p>
                </div>
                <div id="registerForm" style="display:none">
                    <input type="text" id="regUsername" placeholder="Choose a name, warrior">
                    <input type="tel" id="regPhone" placeholder="Phone (e.g. 2348012345678)">
                    <input type="password" id="regPassword" placeholder="Password">
                    <button class="btn-primary" onclick="register()">Join the Empire</button>
                    <p>Have account? <a href="#" onclick="toggleAuth()">Login</a></p>
                </div>
                <p id="authMsg" class="msg"></p>
            </div>
        </div>

        <!-- Profile -->
        <div id="page-profile" class="page">
            <div class="profile-card">

                <!-- Cover + Avatar -->
                <div class="profile-cover" id="profileCover">
                    <div class="cover-fade"></div>
                    <div class="cover-top-actions">
                        <label class="action-btn" for="coverFile">📷 Cover</label>
                        <input type="file" id="coverFile" accept="image/*" style="display:none" onchange="uploadImage('cover')">
                        <label class="action-btn" for="avatarFile">👤 Avatar</label>
                        <input type="file" id="avatarFile" accept="image/*" style="display:none" onchange="uploadImage('avatar')">
                    </div>
                    <div class="avatar-centered">
                        <img id="profileAvatar" src="https://i.imgur.com/HeIi0wU.png" class="profile-avatar">
                    </div>
                </div>

                <!-- Name + Bio -->
                <div class="profile-info">
                    <h2 id="profileName"></h2>
                    <div class="profile-rank" id="profileRank"></div>

                    <!-- Bio display -->
                    <div id="bioDisplay" class="bio-display">
                        <p id="profileBio" class="profile-bio">No bio yet</p>
                        <button class="bio-edit-btn" onclick="showBioEdit()">✏️ Edit Bio</button>
                    </div>

                    <!-- Bio edit -->
                    <div id="bioEdit" class="bio-edit-wrap" style="display:none">
                        <input type="text" id="editBio" placeholder="Your imperial bio..." maxlength="80">
                        <div class="bio-edit-actions">
                            <button class="btn-cancel" onclick="hideBioEdit()">Cancel</button>
                            <button class="btn-primary" onclick="updateProfile()">Save</button>
                        </div>
                    </div>

                    <!-- XP Bar -->
                    <div class="xp-section">
                        <div class="xp-labels">
                            <span id="xpText" class="xp-label-left"></span>
                            <span id="xpPercent" class="xp-label-right"></span>
                        </div>
                        <div class="xp-bar-bg">
                            <div class="xp-bar" id="xpBar"></div>
                        </div>
                    </div>
                </div>

                <!-- Stats -->
                <div class="profile-stats">
                    <div class="stat">
                        <span id="statLevel">1</span>
                        <label>LEVEL</label>
                    </div>
                    <div class="stat">
                        <span id="statWallet">0</span>
                        <label>WALLET</label>
                    </div>
                    <div class="stat">
                        <span id="statVault">0</span>
                        <label>VAULT</label>
                    </div>
                    <div class="stat">
                        <span id="statRank">-</span>
                        <label>RANK</label>
                    </div>
                </div>

            </div>
        </div>

        <!-- Shop -->
        <div id="page-shop" class="page">
            <h1 class="page-title">⚔️ IMPERIAL SHOP</h1>
            <div class="wallet-bar">
                <div class="wallet-item">💰 <span id="shopWallet">0</span><small>Wallet</small></div>
                <div class="wallet-item">🏦 <span id="shopVault">0</span><small>Vault</small></div>
            </div>
            <div class="shop-grid" id="shopGrid"></div>
        </div>

        <!-- Leaderboard -->
        <div id="page-leaderboard" class="page">
            <h1 class="page-title">👑 HALL OF FAME</h1>
            <div class="lb-tabs">
                <button class="lb-tab active" onclick="loadLeaderboard('xp', this)">⚔️ XP</button>
                <button class="lb-tab" onclick="loadLeaderboard('wealth', this)">💰 Wealth</button>
            </div>
            <div id="lbPodium" class="lb-podium"></div>
            <div id="lbList" class="lb-list"></div>
        </div>
    </div>

    <script src="/js/app.js"></script>
</body>
                    </html>
