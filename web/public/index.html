<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Empire Bot</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div id="app">
        <nav class="navbar">
            <div class="nav-logo">⚔️ EMPIRE</div>
            <button class="nav-toggle" onclick="toggleMenu()">☰</button>
            <div class="nav-links" id="navLinks">
                <a href="#" onclick="showPage('home')">Home</a>
                <a href="#" onclick="showPage('leaderboard')">Leaderboard</a>
                <a href="#" onclick="showPage('shop')" id="navShop" style="display:none">Shop</a>
                <a href="#" onclick="showPage('profile')" id="navProfile" style="display:none">Profile</a>
                <button class="btn-login" id="loginBtn" onclick="showPage('login')">Login</button>
                <button class="btn-logout" id="logoutBtn" style="display:none" onclick="logout()">Logout</button>
            </div>
        </nav>

        <!-- Home -->
        <div id="page-home" class="page active">
            <div class="hero">
                <h1>⚔️ EMPIRE</h1>
                <p>A medieval WhatsApp community. Rise through the ranks. Build your legacy.</p>
                <button onclick="currentUser ? showPage('profile') : showPage('login')" class="btn-primary">Join the Empire</button>
            </div>
        </div>

        <!-- Login -->
        <div id="page-login" class="page">
            <div class="auth-card">
                <h2 id="authTitle">Login</h2>
                <div id="loginForm">
                    <input type="tel" id="loginPhone" placeholder="Phone (e.g. 2348012345678)">
                    <input type="password" id="loginPassword" placeholder="Password">
                    <button class="btn-primary" onclick="login()">Login</button>
                    <p>No account? <a href="#" onclick="toggleAuth()">Register</a></p>
                </div>
                <div id="registerForm" style="display:none">
                    <input type="text" id="regUsername" placeholder="Username">
                    <input type="tel" id="regPhone" placeholder="Phone (e.g. 2348012345678)">
                    <input type="password" id="regPassword" placeholder="Password">
                    <button class="btn-primary" onclick="register()">Register</button>
                    <p>Have account? <a href="#" onclick="toggleAuth()">Login</a></p>
                </div>
                <p id="authMsg" class="msg"></p>
            </div>
        </div>

        <!-- Profile -->
        <div id="page-profile" class="page">
            <div class="profile-card">
                <div class="profile-cover" id="profileCover">
                    <div class="cover-overlay">
                        <img id="profileAvatar" src="https://i.imgur.com/HeIi0wU.png" class="profile-avatar">
                        <div class="cover-info">
                            <h2 id="profileName"></h2>
                            <p id="profileBio" class="profile-bio"></p>
                            <p id="profileTitle" class="profile-title"></p>
                            <div class="xp-bar-wrap">
                                <span id="xpText" class="xp-text"></span>
                                <div class="xp-bar-bg"><div class="xp-bar" id="xpBar"></div></div>
                            </div>
                            <div class="profile-rank" id="profileRank"></div>
                        </div>
                    </div>
                </div>
                <div class="profile-stats">
                    <div class="stat"><span id="statXP">0</span><label>XP</label></div>
                    <div class="stat"><span id="statLevel">1</span><label>Level</label></div>
                    <div class="stat"><span id="statWallet">0</span><label>Wallet</label></div>
                    <div class="stat"><span id="statVault">0</span><label>Vault</label></div>
                </div>
                <div class="profile-edit">
                    <p class="edit-title">✏️ Edit Profile</p>
                    <label>Avatar</label>
                    <div class="upload-wrap">
                        <input type="file" id="avatarFile" accept="image/*" onchange="uploadImage('avatar')">
                        <span class="upload-hint">or paste URL</span>
                        <input type="url" id="editAvatar" placeholder="https://i.imgur.com/yourimage.jpg">
                    </div>
                    <label>Cover Photo</label>
                    <div class="upload-wrap">
                        <input type="file" id="coverFile" accept="image/*" onchange="uploadImage('cover')">
                        <span class="upload-hint">or paste URL</span>
                        <input type="url" id="editCover" placeholder="https://i.imgur.com/yourcover.jpg">
                    </div>
                    <label>Bio</label>
                    <input type="text" id="editBio" placeholder="Your imperial bio...">
                    <button class="btn-primary" onclick="updateProfile()">⚔️ Save Changes</button>
                </div>
            </div>
        </div>

        <!-- Shop -->
        <div id="page-shop" class="page">
            <h1 class="page-title">⚔️ IMPERIAL SHOP</h1>
            <div class="wallet-bar">
                <span>💰 Wallet: <b id="shopWallet">0</b></span>
                <span>🏦 Vault: <b id="shopVault">0</b></span>
            </div>
            <div class="shop-grid" id="shopGrid"></div>
        </div>

        <!-- Leaderboard -->
        <div id="page-leaderboard" class="page">
            <h1 class="page-title">👑 HALL OF FAME</h1>
            <div class="lb-tabs">
                <button class="lb-tab active" onclick="loadLeaderboard('xp', this)">⚔️ XP</button>
                <button class="lb-tab" onclick="loadLeaderboard('wealth', this)">💰 Wealth</button>
            </div>
            <div id="lbPodium" class="lb-podium"></div>
            <div id="lbList" class="lb-list"></div>
        </div>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>
